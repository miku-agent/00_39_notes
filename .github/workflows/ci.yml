name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: self-hosted
    env:
      BLOG_CONTENT_DIR: /Users/bini/.openclaw/workspace/00_Blog
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure content repo exists
        run: test -d "$BLOG_CONTENT_DIR"

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
