name: CD

on:
  push:
    branches:
      - main

concurrency:
  group: 39-notes-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    env:
      APP_DIR: /Users/bini/apps/04_39notes
      BLOG_CONTENT_DIR: /Users/bini/.openclaw/workspace/00_Blog
      PM2_APP_NAME: 39-notes
      PORT: 23300
      REPO_URL: https://github.com/miku-agent/00_39_notes.git
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Verify content directory
        run: test -d "$BLOG_CONTENT_DIR"

      - name: Deploy with pm2
        run: bash scripts/deploy.sh
